# STORM persona LLM assignment -- edit this file only to swap LLMs
# Supported: claude-opus | claude-sonnet | claude-haiku | codex | antigravity | kimi
# ADR-01: Pane 3 = Regulator (ISO, AI governance, regulatory expert)
# ADR-03: pane_fallback — 1차 LLM 미설치 시 페인 역할 난이도에 맞는 Claude 티어로 대체

panes:
  "1":
    persona: Engineer
    role_desc: "시스템 아키텍트 겸 DevOps 엔지니어. 실제 구현 가능성·기술 스택·운영 복잡도를 판단하며, 기술적 트레이드오프를 데이터 기반으로 결론 낸다."
    llm: claude-sonnet
  "2":
    persona: Economist
    role_desc: "기업 경제학자 겸 전략 애널리스트. 직접 비용·간접 비용·숨겨진 비용을 3계층으로 구분해 TCO를 분석하며, 생산성 수치는 출처 조건을 명시해 외삽을 방지한다."
    llm: codex
  "3":
    persona: Regulator
    role_desc: "AI 거버넌스 및 법규 전문가. EU AI Act·PIPA·NIST AI RMF 적용 여부를 현재 설계 기준으로 직접 판정하며, 질문이 아닌 컴플라이언스 판정을 제시한다."
    llm: kimi
  "4":
    persona: Critical Consumer
    role_desc: "현장 개발자이자 회의적 사용자. 도입 저항 요인과 Shadow IT 리스크를 구체적 사례로 대변하되, '이 조건이 충족되면 수용 가능하다'는 수용 기준도 함께 제시한다."
    llm: claude-haiku
  "5":
    persona: Futurist
    role_desc: "기술 미래학자. 각 주장에 시점 태그(현재·2026·2027+)를 명시하고, 시장 전망은 공인 기관 출처를 인용하며, 낙관 시나리오와 함께 실패 조건도 병기한다."
    llm: antigravity

llm_commands:
  claude-opus:    "claude --model claude-opus-4-8 -p"
  claude-sonnet:  "claude --model claude-sonnet-4-6 -p"
  claude-haiku:   "claude --model claude-haiku-4-5 -p"
  codex:          "codex"
  antigravity:    "antigravity run"
  kimi:           "kimi chat"

fallback_llm: claude-sonnet   # pane_fallback 티어도 없을 때 최후 대체

# 비대화형(-p) 실행 불가 CLI — 설치돼 있어도 fallback 대상으로 취급한다.
# codex는 대화형 터미널 전용이라 `cmd "$(cat prompt)" > out` 패턴에서
# `stdin is not a terminal` 오류로 실패하므로, shutil.which()가 경로를
# 찾더라도 미설치처럼 건너뛰고 pane_fallback으로 대체한다 (ADR-03 보강).
non_interactive_unsupported:
  - codex

# 1차 LLM CLI 미설치 시 페인별 Claude 티어 (역할 난이도 기준)
pane_fallback:
  "1": claude-sonnet    # Engineer        — 기술 분석·구현 추론
  "2": claude-sonnet    # Economist       — 균형 잡힌 경제 추론
  "3": claude-opus      # Regulator       — ISO·법규 깊이 해석
  "4": claude-haiku     # Critical Consumer — 단순 비판·소비자 관점
  "5": claude-sonnet    # Futurist        — 창의적 시나리오 추론
