# STORM persona LLM assignment -- edit this file only to swap LLMs
# Supported: claude-opus | claude-sonnet | claude-haiku | codex | antigravity | kimi
# ADR-01: Pane 3 = Regulator (ISO, AI governance, regulatory expert)

panes:
  "1":
    persona: Engineer
    llm: claude-sonnet
  "2":
    persona: Economist
    llm: codex
  "3":
    persona: Regulator
    llm: kimi
  "4":
    persona: Critical Consumer
    llm: claude-haiku
  "5":
    persona: Futurist
    llm: antigravity

llm_commands:
  claude-opus:    "claude --model claude-opus-4-8 -p"
  claude-sonnet:  "claude --model claude-sonnet-4-6 -p"
  claude-haiku:   "claude --model claude-haiku-4-5 -p"
  codex:          "codex"
  antigravity:    "antigravity run"
  kimi:           "kimi chat"

fallback_llm: claude-sonnet
