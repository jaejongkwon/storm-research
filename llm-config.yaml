# STORM persona LLM assignment -- edit this file only to swap LLMs
# Supported: claude-opus | claude-sonnet | claude-haiku | codex | antigravity | kimi
# ADR-01: Pane 3 = Regulator (ISO, AI governance, regulatory expert)
# ADR-03: pane_fallback — 1차 LLM 미설치 시 페인 역할 난이도에 맞는 Claude 티어로 대체

panes:
  "1":
    persona: Engineer
    llm: claude-sonnet
  "2":
    persona: Economist
    llm: codex
  "3":
    persona: Regulator
    llm: kimi
  "4":
    persona: Critical Consumer
    llm: claude-haiku
  "5":
    persona: Futurist
    llm: antigravity

llm_commands:
  claude-opus:    "claude --model claude-opus-4-8 -p"
  claude-sonnet:  "claude --model claude-sonnet-4-6 -p"
  claude-haiku:   "claude --model claude-haiku-4-5 -p"
  codex:          "codex"
  antigravity:    "antigravity run"
  kimi:           "kimi chat"

fallback_llm: claude-sonnet   # pane_fallback 티어도 없을 때 최후 대체

# 1차 LLM CLI 미설치 시 페인별 Claude 티어 (역할 난이도 기준)
pane_fallback:
  "1": claude-sonnet    # Engineer        — 기술 분석·구현 추론
  "2": claude-sonnet    # Economist       — 균형 잡힌 경제 추론
  "3": claude-opus      # Regulator       — ISO·법규 깊이 해석
  "4": claude-haiku     # Critical Consumer — 단순 비판·소비자 관점
  "5": claude-sonnet    # Futurist        — 창의적 시나리오 추론
